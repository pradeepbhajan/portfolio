<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#07070f;color:#e2e2f0;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
    h1{font-family:'Syne',sans-serif;font-size:clamp(4rem,15vw,10rem);font-weight:800;background:linear-gradient(135deg,#7c5cfc,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
    h2{font-family:'Syne',sans-serif;font-size:1.5rem;margin:16px 0 12px}
    p{color:#7878a0;margin-bottom:32px}
    a{display:inline-flex;align-items:center;gap:8px;background:#7c5cfc;color:white;padding:12px 28px;border-radius:10px;text-decoration:none;font-weight:600;transition:0.2s}
    a:hover{background:#6b4de6;transform:translateY(-2px)}
  </style>
</head>
<body>
  <div>
    <h1>404</h1>
    <h2>Page not found</h2>
    <p>Looks like this route doesn't exist. Let's get you back.</p>
    <a href="/">← Back to Portfolio</a>
  </div>
</body>
</html>
